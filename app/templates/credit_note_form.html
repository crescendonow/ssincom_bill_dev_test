<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>แบบฟอร์มใบลดหนี้ (Credit Note)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8'
              }
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/credit_note.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>


  <body class="bg-slate-50 text-slate-800">
    <div class="max-w-5xl mx-auto p-4 md:p-8">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2">
          <i class="fa-solid fa-file-invoice text-brand-600"></i>
          แบบฟอร์มใบลดหนี้ (Credit Note)
        </h1>
        <a href="/dashboard" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-slate-600 bg-white hover:bg-slate-50 hover:shadow-sm border border-slate-200 smooth-transition font-medium"
          ><i class="fa-solid fa-arrow-left"></i> กลับ Dashboard</a
        >
      </div>

      <!-- ===== TABS ===== -->
      <div id="controls" class="bg-white shadow-sm border border-slate-200 rounded-2xl p-5 md:p-8 mb-6">
        <div class="border-b border-slate-200 mb-6">
          <nav class="-mb-px flex space-x-8" aria-label="Tabs">
            <button
              id="tab-create"
              class="whitespace-nowrap py-4 px-1 border-b-2 font-semibold text-sm border-brand-500 text-brand-600"
            >
              สร้าง / แก้ไขใบลดหนี้
            </button>
            <button
              id="tab-search"
              class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 transition-colors"
            >
              ค้นหารายการ
            </button>
          </nav>
        </div>

        <!-- ===== PANEL: CREATE ===== -->
        <div id="panel-create">
          <h2 class="text-xl font-bold mb-4 text-slate-700">สร้างใบลดหนี้</h2>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div>
              <label class="block text-sm text-gray-700">วันที่เอกสาร</label>
              <input
                type="date"
                id="cn_date"
                class="form-input"
              />
            </div>
            <div>
              <label class="block text-sm text-gray-700">เลขที่ใบลดหนี้</label>
              <input
                type="text"
                id="creditnote_number"
                class="form-input bg-slate-100"
                readonly
              />
              <p class="text-xs text-gray-500 mt-1">
                รูปแบบ: SSCR{running}-{DD}{MM}/{YYYY พ.ศ.}
              </p>
            </div>
            <div class="flex items-end">
              <button
                id="btnGenNo"
                type="button"
                class="w-full md:w-auto px-4 py-2.5 bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700 shadow-sm smooth-transition hover-scale"
              >
                สร้างเลขเอกสาร
              </button>
            </div>
          </div>

          <!-- ใส่คอนเทนเนอร์ items -->
          <div id="items" class="space-y-3 md:space-y-4">
            <div class="flex flex-wrap gap-3 md:gap-4 item-row items-end">
              <input
                name="grn_number"
                placeholder="เลขที่ใบรับสินค้า"
                class="form-input grn_number flex-1 min-w-[120px]"
              />

              <input
                name="invoice_number"
                placeholder="เลขที่ใบกำกับ"
                class="form-input invoice_number flex-1 min-w-[140px]"
              />

              <input
                name="product_code"
                placeholder="รหัสสินค้า"
                class="form-input product_code w-32"
              />

              <input
                name="description"
                placeholder="รายละเอียด"
                class="form-input description flex-1 min-w-[140px]"
              />

              <!-- ราคา/หน่วย (จะ autofill จากรหัสสินค้า) -->
              <input
                name="unit_price"
                type="number"
                step="0.01"
                placeholder="ราคา/หน่วย"
                class="form-input unit_price w-32"
                oninput="updateTotal()"
              />

              <input
                name="quantity"
                type="number"
                step="0.01"
                placeholder="จำนวน"
                class="form-input quantity w-24"
                oninput="updateTotal()"
              />

              <input
                name="fine"
                type="number"
                step="0.01"
                placeholder="บทปรับ/หน่วย (บาท)"
                class="form-input fine w-28 md:w-32"
                oninput="updateTotal()"
              />

              <!-- แสดงผลรวม VAT 7% -->
              <input
                name="old_total_vat"
                placeholder="มูลค่าเดิม (รวม VAT)"
                readonly
                class="form-input old_total_vat w-40 bg-slate-100 text-right"
              />

              <input
                name="new_total_vat"
                placeholder="มูลค่าใหม่ (รวม VAT)"
                readonly
                class="form-input new_total_vat w-40 bg-slate-100 text-right"
              />

              <!-- เก็บราคาฐาน -->
              <input type="hidden" class="base_price" value="0" />
              <button
                type="button"
                onclick="removeItem(this)"
                class="text-red-600 hover:text-blue-800 font-semibold"
              >
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>

          <div class="mt-2">
            <button
              type="button"
              onclick="addItem()"
              class="text-blue-600 hover:text-blue-800 font-semibold"
            >
              <i class="fa-solid fa-plus"></i> เพิ่มรายการ
            </button>
          </div>

          <!-- ===== ลูกค้า (อิง personid) ===== -->
          <datalist id="personidList"></datalist>
          <datalist id="customerList"></datalist>

          <div class="mt-6 space-y-3">
            <h2 class="font-semibold mb-2">ข้อมูลลูกค้า</h2>

            <div>
              <label
                for="personid"
                class="block mb-1 text-sm font-medium text-gray-900"
                >รหัสลูกค้า (personid)</label
              >
              <input
                type="text"
                name="personid"
                id="personid"
                list="personidList"
                autocomplete="off"
                oninput="selectCustomerByPersonid()"
                placeholder="เช่น PC55901001"
                class="form-input w-full bg-slate-100"
              />
            </div>

            <div>
              <label
                for="customer_name"
                class="block mb-1 text-sm font-medium text-gray-900"
                >ชื่อลูกค้า</label
              >
              <input
                type="text"
                name="customer_name"
                id="customer_name"
                list="customerList"
                oninput="selectCustomer()"
                class="form-input w-full bg-slate-100"
              />
            </div>

            <div>
              <label
                for="customer_address"
                class="block mb-1 text-sm font-medium text-gray-900"
                >ที่อยู่</label
              >
              <input
                type="text"
                name="customer_address"
                id="customer_address"
                class="form-input w-full"
              />
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label
                  for="customer_taxid"
                  class="block mb-1 text-sm font-medium text-gray-900"
                  >เลขประจำตัวผู้เสียภาษี</label
                >
                <input
                  type="text"
                  name="customer_taxid"
                  id="customer_taxid"
                  class="form-input w-full"
                />
              </div>
              <div>
                <label
                  for="tel"
                  class="block mb-1 text-sm font-medium text-gray-900"
                  >โทรศัพท์</label
                >
                <input
                  type="text"
                  name="tel"
                  id="tel"
                  class="form-input w-full"
                />
              </div>
              <div>
                <label
                  for="mobile"
                  class="block mb-1 text-sm font-medium text-gray-900"
                  >มือถือ</label
                >
                <input
                  type="text"
                  name="mobile"
                  id="mobile"
                  class="form-input w-full"
                />
              </div>
              <div>
                <label
                  for="cf_personzipcode"
                  class="block mb-1 text-sm font-medium text-gray-900"
                  >รหัสไปรษณีย์</label
                >
                <input
                  type="text"
                  name="cf_personzipcode"
                  id="cf_personzipcode"
                  class="form-input w-full"
                />
              </div>
              <div>
                <label
                  for="cf_provincename"
                  class="block mb-1 text-sm font-medium text-gray-900"
                  >จังหวัด</label
                >
                <input
                  type="text"
                  name="cf_provincename"
                  id="cf_provincename"
                  class="form-input w-full"
                />
              </div>
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-4 items-end mt-6">
            <div>
              <label class="block mb-1 text-sm font-medium text-gray-700"
                >รวมเป็นเงิน</label
              >
              <div
                class="text-right text-lg md:text-xl font-bold text-green-700"
                id="total_amount"
              >
                ฿ 0.00
              </div>
            </div>
            <div>
              <label
                for="cn_variant"
                class="block mb-1 text-sm font-medium text-gray-700"
              >
                รูปแบบสำหรับ Preview
              </label>
              <select
                id="cn_variant"
                class="form-input"
              >
                <option value="creditnote_original">ต้นฉบับ</option>
                <option value="creditnote_copy">สำเนา</option>
              </select>
            </div>
          </div>

          <div class="mt-6 pt-4 border-t border-slate-100 flex gap-3 flex-wrap">
            <button
              id="btnPreview"
              type="button"
              class="px-4 py-2.5 bg-slate-600 text-white rounded-lg hover:bg-slate-700 font-medium smooth-transition hover-scale flex items-center gap-2"
            >
              <i class="fa-solid fa-eye"></i> Preview
            </button>
            <button
              id="btnSave"
              type="button"
              class="px-5 py-2.5 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium shadow-sm smooth-transition hover-scale flex items-center gap-2"
            >
              <i class="fa-solid fa-floppy-disk"></i> บันทึก
            </button>
            <button
              id="btnUpdate"
              type="button"
              class="px-4 py-2.5 bg-amber-500 text-white rounded-lg hover:bg-amber-600 font-medium hidden smooth-transition hover-scale flex items-center gap-2"
            >
              <i class="fa-solid fa-rotate"></i> อัปเดตใบลดหนี้
            </button>
            <button
              id="btnPDF"
              type="button"
              class="px-4 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-medium smooth-transition hover-scale flex items-center gap-2"
            >
              <i class="fa-solid fa-file-pdf"></i> PDF
            </button>
            <button
              id="btnNew"
              type="button"
              class="px-4 py-2.5 bg-slate-400 text-white rounded-lg hover:bg-slate-500 font-medium hidden smooth-transition flex items-center gap-2"
            >
              <i class="fa-solid fa-plus"></i> สร้างใหม่
            </button>
          </div>
        </div>

        <!-- ===== PANEL: SEARCH ===== -->
        <div id="panel-search" class="hidden">
          <h2 class="text-xl font-bold mb-4 text-slate-700">ค้นหาใบลดหนี้</h2>
          <div class="grid md:grid-cols-3 gap-4 items-end">
            <div>
              <label
                for="searchStartDate"
                class="block text-sm font-medium text-slate-700"
                >วันที่เริ่มต้น</label
              >
              <input
                type="date"
                id="searchStartDate"
                class="form-input"
              />
            </div>
            <div>
              <label
                for="searchEndDate"
                class="block text-sm font-medium text-slate-700"
                >วันที่สิ้นสุด</label
              >
              <input
                type="date"
                id="searchEndDate"
                class="form-input"
              />
            </div>
            <div>
              <label
                for="searchQuery"
                class="block text-sm font-medium text-slate-700"
                >คำค้นหา</label
              >
              <input
                type="text"
                id="searchQuery"
                placeholder="เลขที่ใบลดหนี้ / ชื่อลูกค้า"
                class="form-input"
                autocomplete="off"
              />
            </div>
          </div>
          <div class="mt-4">
            <button
              id="searchBtn"
              class="bg-brand-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-brand-700 shadow-sm smooth-transition hover-scale"
            >
              <i class="fa-solid fa-magnifying-glass"></i> ค้นหา
            </button>
          </div>
          <div class="mt-6 overflow-x-auto rounded-xl border border-slate-200">
            <table class="w-full text-sm text-left">
              <thead>
                <tr class="bg-slate-50 text-slate-600 border-b border-slate-200">
                  <th class="p-3 font-semibold">วันที่</th>
                  <th class="p-3 font-semibold">เลขที่ใบลดหนี้</th>
                  <th class="p-3 font-semibold">ลูกค้า</th>
                  <th class="p-3 font-semibold text-right">ยอดรวม</th>
                  <th class="p-3 font-semibold text-center">จัดการ</th>
                </tr>
              </thead>
              <tbody id="searchResultsBody" class="divide-y divide-slate-100 bg-white"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="preview" class="my-6 flex justify-center hidden"></div>
    </div>

    <script src="/static/js/credit_note.js"></script>
  </body>
</html>
