<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>เข้าสู่ระบบ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Configure Tailwind to use our CSS variables -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center relative overflow-hidden">
  
  <!-- Decorative background elements -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

  <div class="bg-white/80 backdrop-blur-xl border border-white rounded-2xl shadow-xl p-8 w-full max-w-sm relative z-10 hover:shadow-2xl transition-shadow duration-300">
    
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-100 text-brand-600 mb-4">
        <i class="fa-solid fa-user-lock text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">เข้าสู่ระบบ</h1>
      <p class="text-slate-500 text-sm mt-1">กรุณากรอกชื่อผู้ใช้และรหัสผ่าน</p>
    </div>

    {% set next_path = request.query_params.get('next', '/dashboard') %}
    {% if request.query_params.get('error') %}
      <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg p-3 text-center">
        ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
      </div>
    {% endif %}

    <form id="loginForm" class="space-y-4">
      <input type="hidden" name="next" value="{{ next_path }}">
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="username">ผู้ใช้ (Username)</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-user"></i>
          </div>
          <input id="username" name="username" class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white transition-all duration-200" placeholder="admin" required autofocus>
        </div>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">รหัสผ่าน (Password)</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-lock"></i>
          </div>
          <input id="password" name="password" type="password" class="w-full pl-10 pr-12 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white transition-all duration-200" placeholder="••••••••" required>
          <button type="button" id="togglePw" class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm font-medium text-brand-600 hover:text-brand-800 focus:outline-none">
            แสดง
          </button>
        </div>
      </div>
      
      <button class="w-full bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-medium rounded-lg px-4 py-2.5 mt-2 hover:-translate-y-0.5 shadow-md shadow-brand-500/30 transition-all duration-200">
        เข้าสู่ระบบ
      </button>
    </form>

    <div class="text-center mt-6 pt-4 border-t border-slate-100">
      <a href="/" class="text-sm font-medium text-slate-500 hover:text-brand-600 transition-colors">
        <i class="fa-solid fa-arrow-left mr-1"></i> กลับหน้าหลัก
      </a>
    </div>
  </div>

  <!-- แยก JS -->
  <script src="/static/js/login.js" defer></script>
</body>
</html>
