<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>สร้างใบวางบิล</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8'
              }
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/bill_note.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="max-w-6xl mx-auto px-4 sm:px-6 pt-8 page-controls flex items-center justify-between">
        <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2 text-slate-800">
            <i class="fa-solid fa-file-invoice text-brand-600"></i> จัดการใบวางบิล
        </h1>
        <a href="/dashboard" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-slate-600 bg-white hover:bg-slate-50 hover:shadow-sm border border-slate-200 smooth-transition font-medium">
            <i class="fa-solid fa-arrow-left"></i> กลับ Dashboard
        </a>
    </div>

    <div id="controls" class="max-w-6xl mx-auto p-5 sm:p-8 bg-white shadow-sm border border-slate-200 my-8 rounded-2xl">
        <div class="border-b border-slate-200 mb-6">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <button id="tab-create"
                    class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm border-brand-500 text-brand-600">
                    <i class="fa-solid fa-plus mr-2"></i> สร้าง / แก้ไขใบวางบิล
                </button>
                <button id="tab-search"
                    class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300">
                    <i class="fa-solid fa-magnifying-glass mr-2"></i> ค้นหารายการ
                </button>
            </nav>
        </div>
        <div id="panel-create">
            <h1 class="text-2xl font-bold mb-4 text-gray-700">สร้างใบวางบิล</h1>
        </div>
        <div id="panel-search" class="hidden">
            <h1 class="text-2xl font-bold mb-4 text-gray-700">ค้นหาใบวางบิล</h1>
            <div class="grid md:grid-cols-3 gap-4 items-end">
                <div>
                    <label for="searchStartDate" class="block text-sm font-medium text-slate-600 mb-1">วันที่เริ่มต้น</label>
                    <input type="date" id="searchStartDate"
                        class="form-input">
                </div>
                <div>
                    <label for="searchEndDate" class="block text-sm font-medium text-slate-600 mb-1">วันที่สิ้นสุด</label>
                    <input type="date" id="searchEndDate"
                        class="form-input">
                </div>
                <div>
                    <label for="searchQuery" class="block text-sm font-medium text-slate-600 mb-1">คำค้นหา</label>

                    <input type="text" id="searchQuery" placeholder="เลขที่บิล / ชื่อลูกค้า"
                        class="form-input" list="billNoteList"
                        autocomplete="off">
                    <datalist id="billNoteList"></datalist>
                </div>
            </div>
            <div class="mt-6 flex justify-end">
                <button id="searchBillBtn"
                    class="bg-brand-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-brand-700 shadow-sm smooth-transition hover-scale flex items-center gap-2"><i class="fa-solid fa-magnifying-glass"></i> ค้นหา</button>
            </div>
            <div class="mt-6 overflow-x-auto rounded-xl border border-slate-200">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 text-slate-600 border-b border-slate-200">
                        <tr>
                            <th class="p-3 font-semibold">วันที่</th>
                            <th class="p-3 font-semibold">เลขที่ใบวางบิล</th>
                            <th class="p-3 font-semibold">ลูกค้า</th>
                            <th class="p-3 font-semibold text-center w-36">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="searchResultsBody" class="divide-y divide-slate-100 bg-white">
                    </tbody>
                </table>
            </div>
        </div>
        <div class="grid md:grid-cols-4 gap-4 items-end mt-4">
            <div>
                <label for="billDate" class="block text-sm font-medium text-slate-600 mb-1">
                    วันที่ใบวางบิล
                </label>
                <input type="date" id="billDate" class="form-input">
            </div>

            <div>
                <label for="customerSearch" class="block text-sm font-medium text-slate-600 mb-1">ค้นหาลูกค้า</label>
                <input type="text" id="customerSearch" list="customerList"
                    class="form-input" autocomplete="off">
                <datalist id="customerList"></datalist>
                <input type="hidden" id="customerId">
            </div>
            <div>
                <label for="startDate" class="block text-sm font-medium text-slate-600 mb-1">วันที่เริ่มต้น</label>
                <input type="date" id="startDate" class="form-input">
            </div>
            <div>
                <label for="endDate" class="block text-sm font-medium text-slate-600 mb-1">วันที่สิ้นสุด</label>
                <input type="date" id="endDate" class="form-input">
            </div>
        </div>
        <div class="mt-6 flex flex-wrap gap-4 pt-4 border-t border-slate-100">
            <button id="generateBillBtn" class="bg-brand-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-brand-700 shadow-sm smooth-transition hover-scale flex items-center gap-2">
                <i class="fa-solid fa-laptop-file"></i>สร้างเอกสาร</button>
            <button id="saveBillBtn" class="bg-emerald-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-emerald-700 shadow-sm smooth-transition hover-scale hidden items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> บันทึกใบวางบิล</button>
            <button id="printPdfBtn" class="bg-indigo-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-indigo-700 shadow-sm smooth-transition hover-scale hidden items-center gap-2">
                <i class="fa-solid fa-print"></i> พิมพ์ PDF</button>

        </div>
        <div id="loading" class="mt-2 text-gray-500 hidden">กำลังโหลดข้อมูล...</div>
    </div>

    <div id="bill-note-container">
    </div>
    <template id="bill-note-template">
        <div class="A4-page mx-auto bg-white my-8 relative">
            <header class="flex justify-between items-start p-8">
                <div class="text-xs">
                    <h1 class="text-2xl font-bold">บริษัท เอส แอนด์ เอส อินคอม จำกัด</h1>
                    <h1 class="text-2xl font-bold">S &amp; S INCOM CO., LTD.</h1>
                    <p>69 หมู่ 10 ต.พังตรุ อ.พนมทวน จ.กาญจนบุรี 71140</p>
                    <p>Tel.0-3558-9274 email:mailtossincom@gmail.com</p>
                    <p>website:www.ssincom.com</p>
                </div>
                <div class="text-center">
                    <h2 class="text-3xl font-bold">ใบวางบิล</h2>
                    <p class="text-lg"><strong>BILLING NOTE</strong></p>

                    <p class="text-base">เลขประจำตัวผู้เสียภาษีอากร</p>
                    <h2 class="text-2xl font-bold">0715544000020</h2>

                </div>
            </header>
            <section class="border-t-2 border-b-2 border-black mx-8 p-4 text-sm">
                <div class="grid grid-cols-2 gap-x-8">
                    <div>
                        <p><strong>เลขประจำตัวผู้เสียภาษีอากร:</strong> <span class="cust-tax-id"></span> </p>
                        <p><strong>รหัส:</strong> <span class="cust-person-id"></span></p>
                        <p><strong>ชื่อลูกค้า:</strong> <span class="cust-name"></span> /
                            <span class="cust-branch"></span>
                        </p>
                        <p><span class="cust-address"></span></p>
                    </div>
                    <div class="text-right">
                        <p><strong>เลขที่:</strong> <span class="bill-number"></span></p>
                        <p><strong>วันที่:</strong> <span class="bill-date"></span></p>
                        <p><strong>วันครบกำหนดชำระ:</strong> <span class="payment-due-date"></span></p>
                        <p><strong>หน้า:</strong> <span class="page-number"></span></p>
                    </div>
                </div>
            </section>

            <main class="m-8">
                <p class="mb-4 text-base">ได้รับการวางบิลจาก <b>"บริษัท เอส แอนด์ เอส อินคอม จำกัด"</b>
                    โดยมีรายละเอียดรายการค้างชำระเพื่อตรวจสอบและนัดชำระเงิน ดังนี้ -</p>
                <table class="w-full text-sm border-collapse">
                    <thead>
                        <tr class="border-y-2 border-black">
                            <th class="p-2 text-center w-16">ลำดับ</th>
                            <th class="p-2 text-left">เลขที่ใบกำกับภาษี</th>
                            <th class="p-2 text-center">ลงวันที่</th>
                            <th class="p-2 text-center">วันครบกำหนดชำระ</th>
                            <th class="p-2 text-right">จำนวนเงิน</th>
                        </tr>
                    </thead>
                    <tbody class="invoice-table-body">
                    </tbody>
                    <tfoot class="summary-footer hidden">
                        <tr class="border-t-2 border-black font-bold">
                            <td colspan="4" class="p-2 text-right">ยอดเงินสุทธิ</td>
                            <td class="summary-total p-2 text-right">0.00</td>
                        </tr>
                        <tr class="border-t-2 border-b-2 border-black">
                            <td colspan="5" class="total-in-words font-bold p-2 text-right">
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </main>

            <div class="page-ender">
                <footer class="w-full grid grid-cols-4 gap-4 text-center text-sm p-8">
                    <div>
                        <p class="mt-8 signature-underline">&nbsp;</p>
                        <p><strong>(ผู้รับวางบิล)</strong></p>
                    </div>
                    <div>
                        <p class="mt-8 signature-underline">&nbsp;</p>
                        <p><strong>วันที่รับวางบิล</strong></p>
                    </div>
                    <div>
                        <p class="mt-8 signature-underline">&nbsp;</p>
                        <p><strong>(ผู้วางบิล)</strong></p>
                    </div>
                    <div>
                        <p class="mt-8 signature-underline">
                            <span class="signature-date"></span>
                        </p>
                        <p><strong>วันที่</strong></p>
                    </div>
                </footer>
            </div>
        </div>
    </template>

    <script src="/static/js/bill_note.js"></script>
</body>

</html>
