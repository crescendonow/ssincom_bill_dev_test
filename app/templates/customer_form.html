<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <title>จัดการลูกค้า</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>


<body class="bg-slate-50 min-h-screen text-slate-800">
  <div class="max-w-7xl mx-auto py-6 sm:py-8 px-3 sm:px-6 lg:px-8">
    <!-- Back -->
    <div class="mb-4">
      <a href="/" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-slate-600 hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-200 smooth-transition font-medium">
        <i class="fa-solid fa-arrow-left"></i> กลับ Dashboard
      </a>
    </div>

    <!-- ฟอร์มลูกค้า -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8 mb-6 relative overflow-hidden">
      <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
        <div class="w-10 h-10 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center text-xl">
          <i class="fa-solid fa-user-plus"></i>
        </div>
        <h2 class="text-xl sm:text-2xl font-bold text-slate-800">ฟอร์มลูกค้า (เพิ่ม/แก้ไข)</h2>
      </div>

      <form id="customerForm" class="space-y-4">
        <input type="hidden" name="idx" id="idx" />

        <!-- แถว 1 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 sm:gap-4">
          <div>
            <label for="prename" class="block text-sm text-gray-700 mb-1">คำนำหน้า</label>
            <input name="prename" id="prename" class="form-input" placeholder="นาย/นาง/บริษัท" />
          </div>
          <div>
            <label for="fname" class="block text-sm text-gray-700 mb-1">ชื่อ *</label>
            <input name="fname" id="fname" class="form-input" required />
          </div>
          <div>
            <label for="lname" class="block text-sm text-gray-700 mb-1">นามสกุล</label>
            <input name="lname" id="lname" class="form-input" />
          </div>
          <div>
            <label for="personid" class="block text-sm text-gray-700 mb-1">รหัสลูกค้า</label>
            <input name="personid" id="personid" class="form-input" />
          </div>
        </div>

        <!-- แถว 2 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 sm:gap-4">
          <div>
            <label for="cf_taxid" class="block text-sm text-gray-700 mb-1">เลขภาษี</label>
            <input name="cf_taxid" id="cf_taxid" class="form-input" maxlength="13" />
          </div>
          <div>
            <label for="cf_personaddress_tel" class="block text-sm text-gray-700 mb-1">โทรศัพท์</label>
            <input name="cf_personaddress_tel" id="cf_personaddress_tel" class="form-input" />
          </div>
          <div>
            <label for="cf_personaddress_mobile" class="block text-sm text-gray-700 mb-1">มือถือ</label>
            <input name="cf_personaddress_mobile" id="cf_personaddress_mobile" class="form-input" />
          </div>
        </div>

        <!-- ที่อยู่ -->
        <div>
          <label for="cf_personaddress" class="block text-sm text-gray-700 mb-1">ที่อยู่</label>
          <textarea name="cf_personaddress" id="cf_personaddress" class="form-input" rows="2"></textarea>
        </div>

        <!-- แถว 3 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 sm:gap-4">
          <div>
            <label for="cf_provincename" class="block text-sm text-gray-700 mb-1">จังหวัด</label>
            <input name="cf_provincename" id="cf_provincename" class="form-input" list="province_datalist"
              autocomplete="off" />
            <!-- datalist สำหรับ autocomplete จังหวัด -->
            <datalist id="province_datalist"></datalist>
          </div>
          <div>
            <label for="cf_personzipcode" class="block text-sm text-gray-700 mb-1">รหัสไปรษณีย์</label>
            <input name="cf_personzipcode" id="cf_personzipcode" class="form-input" />
          </div>
          <div>
            <label for="fmlpaymentcreditday" class="block text-sm text-gray-700 mb-1">เครดิต (วัน)</label>
            <input type="number" name="fmlpaymentcreditday" id="fmlpaymentcreditday" class="form-input" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 sm:gap-4">
          <div>
            <label for="cf_hq" class="block text-sm text-gray-700 mb-1">ประเภท</label>
            <select name="cf_hq" id="cf_hq" class="form-input">
              <option value="1">สำนักงานใหญ่</option>
              <option value="0">สาขา</option>
            </select>
          </div>
          <div id="branch_field_wrapper">
            <label for="cf_branch" class="block text-sm text-gray-700 mb-1">รหัสสาขา (เช่น 0001)</label>
            <input name="cf_branch" id="cf_branch" class="form-input" maxlength="20" placeholder="เช่น 00001" />
          </div>
        </div>

        <!-- ออปชัน + คำเตือน -->
        <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3">
          <label for="redirectDash" class="flex items-center gap-2 text-sm">
            <input type="checkbox" id="redirectDash" class="h-4 w-4" />
            บันทึกแล้วกลับ Dashboard
          </label>
          <span id="dupWarn" class="text-red-600 text-sm hidden">⚠️ พบข้อมูลซ้ำ (ชื่อ รหัสลูกค้า หรือ เลขภาษี)</span>
        </div>

        <!-- ปุ่ม -->
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 mt-6 pt-4 border-t border-slate-100">
          <button type="submit" class="px-5 py-2.5 bg-brand-600 text-white rounded-lg hover:bg-brand-700 shadow-sm hover:shadow hover:-translate-y-0.5 smooth-transition font-medium flex items-center justify-center gap-2">
            <i class="fa-solid fa-floppy-disk"></i> บันทึก</button>
          <button type="button" id="btnReset" class="px-5 py-2.5 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 smooth-transition font-medium flex items-center justify-center gap-2">
            <i class="fa-solid fa-window-restore"></i> รีเซ็ต</button>
          <button type="button" id="btnDelete" class="px-5 py-2.5 bg-rose-600 text-white rounded-lg hover:bg-rose-700 shadow-sm hover:shadow hover:-translate-y-0.5 smooth-transition font-medium hidden flex items-center justify-center gap-2">
            <i class="fa-solid fa-trash"></i> ลบ</button>
        </div>
      </form>
    </section>

    <!-- ตารางข้อมูลลูกค้า -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8">
      <div class="flex items-center justify-between mb-4 gap-3 flex-wrap border-b border-slate-100 pb-4">
        <h3 class="text-lg sm:text-xl font-bold text-slate-800 flex items-center gap-2">
          <i class="fa-solid fa-list text-brand-600"></i>
          ข้อมูลลูกค้าทั้งหมด
        </h3>
        <div class="relative w-full sm:w-72">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
          <input id="search" placeholder="ค้นหา (ชื่อ / รหัส / เบอร์ / ทะเบียน)" class="form-input pl-10" />
        </div>
      </div>

      <!-- ตารางห่อด้วย container กันล้น -->
      <div class="overflow-x-auto rounded-xl border border-slate-200">
        <table class="w-full text-sm text-left">
          <thead>
            <tr class="bg-slate-50 text-slate-600 border-b border-slate-200">
              <th class="p-3 font-semibold">ชื่อ</th>
              <th class="p-3 font-semibold hidden sm:table-cell">รหัสลูกค้า</th>
              <th class="p-3 font-semibold hidden lg:table-cell">เลขภาษี</th>
              <th class="p-3 font-semibold">มือถือ</th>
              <th class="p-3 font-semibold hidden md:table-cell">จังหวัด</th>
              <th class="p-3 font-semibold w-24 text-center">เครื่องมือ</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-slate-100 bg-white"></tbody>
        </table>
      </div>

      <!-- แถบเปลี่ยนหน้า -->
      <div class="flex items-center justify-between mt-3 flex-wrap gap-2">
        <div id="resultInfo" class="text-sm text-gray-500">—</div>
        <div class="flex items-center gap-2">
          <button id="prevPage" class="px-3 py-1 border rounded hover:bg-gray-50">ก่อนหน้า</button>
          <span id="pageInfo" class="text-sm text-gray-700">หน้า 1 / 1</span>
          <button id="nextPage" class="px-3 py-1 border rounded hover:bg-gray-50">ถัดไป</button>
        </div>
      </div>
    </section>
  </div>

  <!-- JS -->
  <script src="/static/js/customer_form.js" defer></script>
</body>

</html>
