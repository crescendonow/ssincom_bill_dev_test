<!-- templates/product_form.html -->
<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>จัดการสินค้า</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto py-8 px-4">
    <div class="mb-4">
      <a href="/" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-slate-600 hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-200 smooth-transition font-medium">
        <i class="fa-solid fa-arrow-left"></i> กลับ Dashboard
      </a>
    </div>

    <!-- ฟอร์มสินค้า -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8 mb-6 relative overflow-hidden">
      <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
        <div class="w-10 h-10 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center text-xl">
          <i class="fa-solid fa-box-open"></i>
        </div>
        <h2 class="text-xl sm:text-2xl font-bold text-slate-800">ฟอร์มสินค้า (เพิ่ม/แก้ไข)</h2>
      </div>

      <form id="productForm" class="space-y-4">
        <input type="hidden" name="idx" id="idx">

        <div class="grid md:grid-cols-5 gap-4">
          <div>
            <label for="cf_itemid" class="block text-sm text-gray-700 mb-1">รหัสสินค้า *</label>
            <input name="cf_itemid" id="cf_itemid" class="form-input" maxlength="20" required>
          </div>
          <div class="md:col-span-2">
            <label for="cf_itemname" class="block text-sm text-gray-700 mb-1">ชื่อสินค้า *</label>
            <input name="cf_itemname" id="cf_itemname" class="form-input" required>
          </div>
          <div>
            <label for="cf_unitname" class="block text-sm text-gray-700 mb-1">หน่วย</label>
            <input name="cf_unitname" id="cf_unitname" class="form-input" placeholder="เช่น ถุง, ตัน, ชิ้น">
          </div>
          <div>
            <label for="cf_itempricelevel_price" class="block text-sm text-gray-700 mb-1">ราคา</label>
            <input type="number" step="0.01" name="cf_itempricelevel_price" id="cf_itempricelevel_price" class="form-input"
              value="0">
          </div>
        </div>

        <div class="grid md:grid-cols-5 gap-4">
          <div>
            <label for="cf_items_ordinary" class="block text-sm text-gray-700 mb-1">ลำดับ/Ordinary</label>
            <input type="number" name="cf_items_ordinary" id="cf_items_ordinary" class="form-input">
          </div>
          <div class="md:col-span-4 flex items-center gap-3">
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" id="redirectDash" class="h-4 w-4">
              บันทึกแล้วกลับ Dashboard
            </label>
            <span id="dupWarn" class="text-red-600 text-sm hidden">⚠️ พบข้อมูลซ้ำ (รหัสหรือชื่อสินค้า)</span>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 mt-6 pt-4 border-t border-slate-100">
          <button type="submit" class="px-5 py-2.5 bg-brand-600 text-white rounded-lg hover:bg-brand-700 shadow-sm hover:shadow hover:-translate-y-0.5 smooth-transition font-medium flex items-center justify-center gap-2">
            <i class="fa-solid fa-floppy-disk"></i> บันทึก</button>
          <button type="button" id="btnReset" class="px-5 py-2.5 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 smooth-transition font-medium flex items-center justify-center gap-2">
            <i class="fa-solid fa-window-restore"></i> รีเซ็ต</button>
          <button type="button" id="btnDelete" class="px-5 py-2.5 bg-rose-600 text-white rounded-lg hover:bg-rose-700 shadow-sm hover:shadow hover:-translate-y-0.5 smooth-transition font-medium hidden flex items-center justify-center gap-2">
            <i class="fa-solid fa-trash"></i> ลบ</button>
        </div>
      </form>
    </div>

    <!-- ตารางรายการสินค้า -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8">
      <div class="flex items-center justify-between mb-4 gap-3 flex-wrap border-b border-slate-100 pb-4">
        <h3 class="text-lg sm:text-xl font-bold text-slate-800 flex items-center gap-2">
          <i class="fa-solid fa-list text-brand-600"></i>
          รายการสินค้า
        </h3>
        <div class="relative w-full sm:w-72">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
          <input id="search" placeholder="ค้นหา (รหัส / ชื่อ / หน่วย)" class="form-input pl-10 w-full">
        </div>
      </div>

      <div class="overflow-x-auto rounded-xl border border-slate-200">
        <table class="w-full text-sm text-left">
          <thead>
            <tr class="bg-slate-50 text-slate-600 border-b border-slate-200">
              <th class="p-3 font-semibold">รหัส</th>
              <th class="p-3 font-semibold">ชื่อสินค้า</th>
              <th class="p-3 font-semibold hidden sm:table-cell">หน่วย</th>
              <th class="p-3 font-semibold text-right">ราคา</th>
              <th class="p-3 font-semibold hidden md:table-cell text-center">Ord.</th>
              <th class="p-3 font-semibold w-24 text-center">เครื่องมือ</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-slate-100 bg-white"></tbody>
        </table>
      </div>

      <!-- แถบเปลี่ยนหน้า -->
      <div class="flex items-center justify-between mt-3 flex-wrap gap-2">
        <div id="resultInfo" class="text-sm text-gray-500">—</div>
        <div class="flex items-center gap-2">
          <button id="prevPage" class="px-3 py-1 border rounded hover:bg-gray-50">ก่อนหน้า</button>
          <span id="pageInfo" class="text-sm text-gray-700">หน้า 1 / 1</span>
          <button id="nextPage" class="px-3 py-1 border rounded hover:bg-gray-50">ถัดไป</button>
        </div>
      </div>
    </div>
  </div>



  <script src="/static/js/product_form.js" defer></script>
</body>

</html>
